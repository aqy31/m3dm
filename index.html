<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متحف الموصل الافتراضي - الخريطة التفاعلية</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Tajawal', sans-serif; background-color: #000; touch-action: none; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 100; overflow: hidden;
            transition: opacity 0.8s ease-in-out;
            display: block; 
        }

        #map-content {
            position: absolute; 
            width: 2600px; 
            height: 1600px;
            background-image: url('mosul_map_5sites.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            top: 50%; left: 50%; 
            transform-origin: center center; cursor: grab;
            will-change: transform;
        }
        #map-content:active { cursor: grabbing; }

        .map-title {
            position: absolute; top: 30px; width: 100%; text-align: center;
            font-size: 38px; font-weight: bold; color: #e9d8a6; z-index: 101; pointer-events: none;
            font-family: 'Amiri', serif;
            text-shadow: 0 5px 15px rgba(233, 216, 166, 0.3), 0 2px 5px rgba(0,0,0,0.8);
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.7), transparent);
            padding: 15px 0;
            letter-spacing: 1px;
        }

        .map-pin {
            position: absolute; 
            cursor: pointer; 
            transform: translate(-50%, -50%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pin-img {
            width: 120px; 
            height: auto;
            pointer-events: none; 
            transition: all 0.3s ease;
        }

        .map-pin:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 10; }

        #controls-ui {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 101;
            display: none; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }
        
        #instructions {
            background: rgba(255, 255, 255, 0.9); color: #333; padding: 15px; border-radius: 12px;
            font-size: 15px; text-align: right; pointer-events: none; border: 1px solid #ccc;
            transition: opacity 0.5s ease; opacity: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .circle-btn {
            width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; pointer-events: all; transition: all 0.3s; border: none;
        }
        .circle-btn:active { transform: scale(0.9); }
        
        #back-btn { background: rgba(187, 43, 43, 0.95); color: white; border: 1px solid #ff4d4d; box-shadow: 0 5px 15px rgba(187,43,43,0.4); }
        #back-btn:hover { background: rgba(220, 30, 30, 1); box-shadow: 0 5px 20px rgba(187,43,43,0.6); }
        
        #hide-ui-btn { background: rgba(255, 255, 255, 0.9); color: #333; border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #hide-ui-btn:hover { background: #e0e0e0; color: #000; }

        #info-panel {
            display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 500px;
            background: rgba(255, 255, 255, 0.95); color: #333; padding: 25px; border-radius: 15px; border: 1px solid #ddd;
            z-index: 200; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-out; font-family: 'Tajawal', sans-serif;
        }
        
        @keyframes fadeIn { from { opacity: 0; bottom: -20px; } to { opacity: 1; bottom: 30px; } }
        #info-title { margin-top: 0; color: #333; font-size: 26px; font-family: 'Amiri', serif; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        #info-desc { font-size: 16px; line-height: 1.8; margin-bottom: 20px; color: #555; }
        #close-info-btn {
            background: #e0e0e0; color: #333; border: 1px solid #ccc; font-weight: bold; font-family: 'Tajawal', sans-serif;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; float: left; transition: all 0.2s;
        }
        #close-info-btn:hover { background: #ccc; color: #000; }

        #timeline-ui {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 500px; display: none; z-index: 105;
            background: rgba(255, 255, 255, 0.9); padding: 15px 25px; border-radius: 30px;
            border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            align-items: center; gap: 15px; transition: opacity 0.5s;
        }
        #timeline-slider {
            flex-grow: 1; -webkit-appearance: none; height: 6px; background: #ddd;
            border-radius: 4px; outline: none; direction: rtl; pointer-events: all;
        }
        #timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: #333; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        #timeline-year {
            color: #333; font-size: 22px; font-weight: bold; font-family: 'Amiri', serif; min-width: 70px; text-align: center;
        }
    </style>

    <script>
        window.isUIHidden = false;
        window.isArtifactDragging = false; 
        window.currentRoomType = ''; 

        function toggleUI(forceState) {
            window.isUIHidden = typeof forceState === 'boolean' ? forceState : !window.isUIHidden;
            const info = document.getElementById('info-panel');
            const inst = document.getElementById('instructions');
            const eyeIcon = document.getElementById('eye-icon');
            const timelineUI = document.getElementById('timeline-ui');
            
            if (window.isUIHidden) {
                info.style.display = 'none'; inst.style.opacity = '0';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                if (window.currentRotatingArtifact || window.isStairsMode || window.currentRoomType === 'site2') info.style.display = 'block';
                inst.style.opacity = '1';
                if ((window.isStairsMode || window.currentRoomType === 'site2') && timelineUI) timelineUI.style.opacity = '1';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        AFRAME.registerComponent('artifact-rotator', {
            init: function () {
                this.isDragging = false; this.previousX = 0; this.camera = document.querySelector('#cam');
                this.onDown = (e) => {
                    let evt = e.detail && e.detail.mouseEvent ? e.detail.mouseEvent : e;
                    if (evt.touches && evt.touches.length > 1) return; 
                    this.isDragging = true; 
                    window.isArtifactDragging = true; 
                    this.previousX = evt.clientX || (evt.touches && evt.touches[0] ? evt.touches[0].clientX : 0);
                    if(this.camera) this.camera.setAttribute('look-controls', 'enabled', false);
                };
                this.onMove = (e) => {
                    if (!this.isDragging) return;
                    if (e.touches && e.touches.length > 1) { 
                        this.isDragging = false; window.isArtifactDragging = false; 
                        if(this.camera) this.camera.setAttribute('look-controls', 'enabled', true); 
                        return; 
                    }
                    let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : undefined);
                    if(clientX === undefined) return;
                    let deltaX = clientX - this.previousX; 
                    this.el.object3D.rotation.y += deltaX * 0.04; 
                    this.previousX = clientX;
                };
                this.onUp = () => { 
                    if(this.isDragging) { 
                        this.isDragging = false; window.isArtifactDragging = false; 
                        if(this.camera) this.camera.setAttribute('look-controls', 'enabled', true); 
                    } 
                };
                this.el.addEventListener('mousedown', this.onDown); window.addEventListener('mousemove', this.onMove);
                window.addEventListener('mouseup', this.onUp); window.addEventListener('touchmove', this.onMove, {passive: true}); window.addEventListener('touchend', this.onUp);
            },
            tick: function () { if (!this.isDragging) this.el.object3D.rotation.y += 0.005; },
            remove: function () {
                this.el.removeEventListener('mousedown', this.onDown); window.removeEventListener('mousemove', this.onMove);
                window.removeEventListener('mouseup', this.onUp); window.removeEventListener('touchmove', this.onMove); window.removeEventListener('touchend', this.onUp);
                if(this.camera) this.camera.setAttribute('look-controls', 'enabled', true);
            }
        });

        function buildWhiteElegantRoom(container) {
            pillarsContainer.setAttribute('data-room-type', 'white'); 
            let room = document.createElement('a-entity');
            let floor = document.createElement('a-plane'); floor.setAttribute('rotation', '-90 0 0'); floor.setAttribute('width', '80'); floor.setAttribute('height', '80'); floor.setAttribute('color', '#e9ecef'); floor.setAttribute('material', 'roughness: 0.4; metalness: 0.1'); room.appendChild(floor);
            let ceil = document.createElement('a-plane'); ceil.setAttribute('rotation', '90 0 0'); ceil.setAttribute('width', '80'); ceil.setAttribute('height', '80'); ceil.setAttribute('color', '#ffffff'); ceil.setAttribute('position', '0 18 0'); room.appendChild(ceil);
            const walls = [ { x: 0, y: 9, z: -40, rotY: 0 }, { x: 0, y: 9, z: 40, rotY: 180 }, { x: -40, y: 9, z: 0, rotY: 90 }, { x: 40, y: 9, z: 0, rotY: -90 } ];
            walls.forEach(w => {
                let wall = document.createElement('a-plane'); wall.setAttribute('width', '80'); wall.setAttribute('height', '18'); wall.setAttribute('color', '#f8f9fa'); wall.setAttribute('material', 'roughness: 0.9; metalness: 0.0'); wall.setAttribute('rotation', `0 ${w.rotY} 0`); wall.setAttribute('position', `${w.x} ${w.y} ${w.z}`); room.appendChild(wall);
                let bottomTrim = document.createElement('a-box'); bottomTrim.setAttribute('width', '80'); bottomTrim.setAttribute('height', '0.4'); bottomTrim.setAttribute('depth', '0.2'); bottomTrim.setAttribute('color', '#adb5bd'); bottomTrim.setAttribute('material', 'roughness: 0.5; metalness: 0.2'); bottomTrim.setAttribute('position', `${w.x * 0.99} 0.2 ${w.z * 0.99}`); bottomTrim.setAttribute('rotation', `0 ${w.rotY} 0`); room.appendChild(bottomTrim);
                let topTrim = document.createElement('a-box'); topTrim.setAttribute('width', '80'); topTrim.setAttribute('height', '0.6'); topTrim.setAttribute('depth', '0.4'); topTrim.setAttribute('color', '#ced4da'); topTrim.setAttribute('material', 'roughness: 0.5; metalness: 0.2'); topTrim.setAttribute('position', `${w.x * 0.99} 17.7 ${w.z * 0.99}`); topTrim.setAttribute('rotation', `0 ${w.rotY} 0`); room.appendChild(topTrim);
            });
            container.appendChild(room);
        }

        function buildKouyunjikDarkRoom(container) {
            pillarsContainer.setAttribute('data-room-type', 'dark_kouyunjik'); 
            let room = document.createElement('a-entity');
            
            let floor = document.createElement('a-plane'); floor.setAttribute('rotation', '-90 0 0'); floor.setAttribute('width', '60'); floor.setAttribute('height', '60'); floor.setAttribute('color', '#212529'); floor.setAttribute('material', 'roughness: 0.6; metalness: 0.2'); room.appendChild(floor);
            let ceil = document.createElement('a-plane'); ceil.setAttribute('rotation', '90 0 0'); ceil.setAttribute('width', '60'); ceil.setAttribute('height', '60'); ceil.setAttribute('color', '#1a1d21'); ceil.setAttribute('position', '0 15 0'); room.appendChild(ceil);
            
            const walls = [ { x: 0, y: 7.5, z: -30, rotY: 0 }, { x: 0, y: 7.5, z: 30, rotY: 180 }, { x: -30, y: 7.5, z: 0, rotY: 90 }, { x: 30, y: 7.5, z: 0, rotY: -90 } ];
            walls.forEach(w => {
                let wall = document.createElement('a-plane'); wall.setAttribute('width', '60'); wall.setAttribute('height', '15'); wall.setAttribute('color', '#1a1d21'); wall.setAttribute('material', 'roughness: 0.9; metalness: 0.1'); wall.setAttribute('rotation', `0 ${w.rotY} 0`); wall.setAttribute('position', `${w.x} ${w.y} ${w.z}`); room.appendChild(wall);
                let trim = document.createElement('a-box'); trim.setAttribute('width', '60'); trim.setAttribute('height', '0.2'); trim.setAttribute('depth', '0.3'); trim.setAttribute('color', '#495057'); trim.setAttribute('position', `${w.x * 0.995} 0.1 ${w.z * 0.995}`); trim.setAttribute('rotation', `0 ${w.rotY} 0`); room.appendChild(trim);
            });
            container.appendChild(room);
        }

        window.isStairsMode = false;
        let targetStairProgress = 0, currentStairProgress = 0, maxStairProgress = 0;
        let site2TargetProgress = 0, site2CurrentProgress = 0; 

        AFRAME.registerComponent('stairs-manager', {
            tick: function () {
                if (window.isStairsMode && window.currentStairsConfig) {
                    currentStairProgress += (targetStairProgress - currentStairProgress) * 0.1;
                    this.moveCameraDirect(currentStairProgress, window.currentStairsConfig);
                } else if (window.currentRoomType === 'site2' && window.currentRoomConfig) {
                    site2CurrentProgress += (site2TargetProgress - site2CurrentProgress) * 0.1;
                    this.moveCameraDirect(site2CurrentProgress, window.currentRoomConfig);
                } else { return; }
            },
            moveCameraDirect: function(progress, config) {
                let idx1 = Math.floor(progress);
                let idx2 = Math.min(idx1 + 1, config.length - 1);
                let t = progress - idx1; 
                let c1 = config[idx1], c2 = config[idx2];
                
                if (window.currentRoomType === 'site2') {
                    let currentCamX = c1.camX + (c2.camX - c1.camX) * t;
                    let currentCamZ = c1.camZ + (c2.camZ - c1.camZ) * t;
                    
                    let artX = c1.x + (c2.x - c1.x) * t;
                    let artZ = c1.z + (c2.z - c1.z) * t;
                    let artY = c1.artY + (c2.artY - c1.artY) * t;

                    let dirX = artX - currentCamX;
                    let dirZ = artZ - currentCamZ;
                    let len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                    if(len > 0) { dirX /= len; dirZ /= len; }

                    let zoom = window.stairZoom || 0; 
                    if (zoom < -7.5) zoom = -7.5; 
                    if (zoom > 5) zoom = 5;   
                    window.stairZoom = zoom;

                    currentCamX += dirX * (-zoom);
                    currentCamZ += dirZ * (-zoom);
                    
                    // الإضافة الجديدة: التحكم بارتفاع الكاميرا عند الزووم
                    let camY = 1.6 + (window.stairPanY || 0);

                    this.el.setAttribute('position', `${currentCamX} ${camY} ${currentCamZ}`);
                    
                    let targetVec = new THREE.Vector3(artX, artY, artZ);
                    let m = new THREE.Matrix4();
                    m.lookAt(this.el.object3D.position, targetVec, new THREE.Vector3(0,1,0));
                    this.el.object3D.quaternion.setFromRotationMatrix(m);

                } else {
                    let currentAngle = c1.angle + (c2.angle - c1.angle) * t;
                    let currentH = c1.artY + (c2.artY - c1.artY) * t; 
                    
                    let defaultCamR = 7.0;
                    let camR = defaultCamR + (window.stairZoom || 0); 
                    if (camR < 1.5) { camR = 1.5; window.stairZoom = 1.5 - 7.0; }
                    if (camR > 15.0) { camR = 15.0; window.stairZoom = 15.0 - 7.0; }

                    let camX = camR * Math.sin(currentAngle);
                    let camZ = -camR * Math.cos(currentAngle);
                    
                    // الإضافة الجديدة: التحكم بارتفاع الكاميرا عند الزووم
                    let camY = currentH + 1.0 + (window.stairPanY || 0);

                    this.el.setAttribute('position', `${camX} ${camY} ${camZ}`);
                    
                    let artX = 4.0 * Math.sin(currentAngle);
                    let artZ = -4.0 * Math.cos(currentAngle);
                    let targetVec = new THREE.Vector3(artX, currentH + 0.5, artZ);
                    let m = new THREE.Matrix4();
                    m.lookAt(this.el.object3D.position, targetVec, new THREE.Vector3(0,1,0));
                    this.el.object3D.quaternion.setFromRotationMatrix(m);
                }

                let closest = Math.round(progress);
                if (window.lastShownTextIdx !== closest) {
                    window.lastShownTextIdx = closest;
                    document.getElementById('info-title').innerText = config[closest].title;
                    document.getElementById('info-desc').innerText = config[closest].desc;
                    document.getElementById('timeline-year').innerText = config[closest].year;
                    if (!window.isUIHidden) document.getElementById('info-panel').style.display = 'block';
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('timeline-slider').addEventListener('input', function(e) {
                if (window.isStairsMode) {
                    targetStairProgress = parseFloat(e.target.value);
                } else if (window.currentRoomType === 'site2') {
                    site2TargetProgress = parseFloat(e.target.value);
                }
                
                let camEl = document.querySelector('#cam');
                if(camEl && camEl.components['look-controls']) {
                    camEl.components['look-controls'].yawObject.rotation.set(0,0,0);
                    camEl.components['look-controls'].pitchObject.rotation.set(0,0,0);
                }
            });
        });

        AFRAME.registerComponent('blender-controls', {
            schema: { speed: {default: 0.015}, zoomSpeed: {default: 0.08} },
            init: function () {
                this.camera = document.querySelector('#cam'); this.active = false; this.lastX = 0; this.lastY = 0;
                document.addEventListener('contextmenu', e => e.preventDefault());
                document.addEventListener('mousedown', (e) => { if (e.button === 2 || e.button === 1) { this.active = true; this.lastX = e.clientX; this.lastY = e.clientY; } });
                document.addEventListener('mouseup', () => this.active = false);
                document.addEventListener('mousemove', (e) => { if (!this.active || window.isStairsMode || window.currentRoomType === 'site2') return; let dx = e.clientX - this.lastX, dy = e.clientY - this.lastY; this.lastX = e.clientX; this.lastY = e.clientY; this.pan(-dx, dy); });

                let initialDist = 0;
                document.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) {
                        this.active = true; this.lastX = (e.touches[0].clientX + e.touches[1].clientX) / 2; this.lastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    }
                });
                document.addEventListener('touchmove', (e) => {
                    if (this.active && e.touches.length === 2) {
                        let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        let dx = cx - this.lastX, dy = cy - this.lastY; this.lastX = cx; this.lastY = cy; 
                        
                        if (!window.isStairsMode && window.currentRoomType !== 'site2') {
                            this.pan(-dx, dy); 
                        } else {
                            // الإضافة الجديدة: رفع وخفض الكاميرا بإصبعين
                            window.stairPanY = (window.stairPanY || 0) - dy * 0.008;
                            if(window.stairPanY > 5) window.stairPanY = 5;
                            if(window.stairPanY < -2) window.stairPanY = -2;
                        }

                        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        let distDelta = currentDist - initialDist; initialDist = currentDist; 
                        if (window.isStairsMode || window.currentRoomType === 'site2') { window.stairZoom = (window.stairZoom || 0) - distDelta * 0.01; } else { this.zoom(distDelta * -0.005); }
                    }
                });
                document.addEventListener('touchend', () => this.active = false);
                document.addEventListener('wheel', (e) => { 
                    if(window.isStairsMode || window.currentRoomType === 'site2') { window.stairZoom = (window.stairZoom || 0) + e.deltaY * 0.02; } 
                    else { this.zoom(e.deltaY * 0.02); } 
                });
            },
            pan: function(dx, dy) { 
                if (!this.camera) return; let camRot = this.camera.object3D.rotation; let v = new THREE.Vector3(dx * this.data.speed, -dy * this.data.speed, 0); v.applyEuler(camRot); this.el.object3D.position.add(v); toggleUI(true); 
            },
            zoom: function(dz) {
                if (!this.camera) return; this.el.removeAttribute('animation'); let camRot = this.camera.object3D.rotation; let v = new THREE.Vector3(0, 0, dz); v.applyEuler(camRot); this.el.object3D.position.add(v);
                if (dz < -0.001) { toggleUI(true); } else if (dz > 0.001) { toggleUI(false); }
            }
        });
    </script>
</head>
<body>

    <div id="ui-layer">
        <div class="map-title">متحف نينوى الافتراضي</div>
        
        <div id="map-content">
            <div id="pin-nergal" class="map-pin" style="top: 69%; left: 28%;" onclick="enterSite('site1')">
                <img src="site1.png" alt="بوابة نرجال" class="pin-img">
            </div>
            <div id="pin-kouyunjik" class="map-pin" style="top: 37%; left: 42%;" onclick="enterSite('site2')">
                <img src="site2.png" alt="تل قوينجق" class="pin-img">
            </div>
            <div id="pin-nuri" class="map-pin" style="top: 34%; left: 43%;" onclick="enterSite('site3')">
                <img src="site3.png" alt="المنارة الحدباء" class="pin-img">
            </div>
            <div id="pin-bashtabiya" class="map-pin" style="top: 24%; left: 54%;" onclick="enterSite('site4')">
                <img src="site4.png" alt="قلعة باشطابيا" class="pin-img">
            </div>
            <div id="pin-museum" class="map-pin" style="top: 51%; left: 47%;" onclick="enterSite('site5')">
                <img src="site5.png" alt="القاعة الرئيسية" class="pin-img">
            </div>
        </div>
    </div>

    <div id="controls-ui">
        <div id="instructions">
            <b>دليل التحكم:</b><br>👆 إصبع واحد: التفات وإدارة المجسمات<br>✌️ إصبعين: مشي وزووم للتقريب (وللأعلى/الأسفل)<br>🖱️ نقرة واحدة: تقريب عميق للمجسم (دبل كليك للرجوع)
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="hide-ui-btn" class="circle-btn" onclick="toggleUI()" title="إخفاء/إظهار الواجهة">
                <svg id="eye-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button id="back-btn" class="circle-btn" onclick="exitSite()" title="الرجوع للخارطة">

    <script>
        const mapContent = document.getElementById('map-content');
        const mapWidth = 2600;
        const mapHeight = 1600;
        
        let minScale = Math.max(window.innerWidth / mapWidth, window.innerHeight / mapHeight);
        let scale = minScale * 1.5; 
        let pointX = 0, pointY = 0;
        let mapPanning = false, mapStart = { x: 0, y: 0 };
        
        function clampMap() {
            const maxPanX = (mapWidth * scale - window.innerWidth) / 2;
            const maxPanY = (mapHeight * scale - window.innerHeight) / 2;
            if (pointX > maxPanX) pointX = maxPanX; if (pointX < -maxPanX) pointX = -maxPanX;
            if (pointY > maxPanY) pointY = maxPanY; if (pointY < -maxPanY) pointY = -maxPanY;
        }

        function updateMapTransform() { clampMap(); mapContent.style.transform = `translate(calc(-50% + ${pointX}px), calc(-50% + ${pointY}px)) scale(${scale})`; }
        window.addEventListener('resize', () => { minScale = Math.max(window.innerWidth / mapWidth, window.innerHeight / mapHeight); if (scale < minScale) scale = minScale; updateMapTransform(); });
        updateMapTransform(); 
        
        mapContent.addEventListener('mousedown', function(e) { e.preventDefault(); mapPanning = true; mapStart = { x: e.clientX - pointX, y: e.clientY - pointY }; });
        window.addEventListener('mousemove', function(e) { if (!mapPanning) return; pointX = e.clientX - mapStart.x; pointY = e.clientY - mapStart.y; updateMapTransform(); });
        window.addEventListener('mouseup', function() { mapPanning = false; });
        mapContent.addEventListener('touchstart', function(e) { mapPanning = true; mapStart = { x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY }; }, {passive: false});
        window.addEventListener('touchmove', function(e) { if (!mapPanning) return; e.preventDefault(); pointX = e.touches[0].clientX - mapStart.x; pointY = e.touches[0].clientY - mapStart.y; updateMapTransform(); }, {passive: false});
        window.addEventListener('touchend', function() { mapPanning = false; });
        mapContent.addEventListener('wheel', function(e) { e.preventDefault(); let delta = (e.wheelDelta ? e.wheelDelta : -e.deltaY); (delta > 0) ? (scale *= 1.1) : (scale /= 1.1); scale = Math.min(Math.max(minScale, scale), 3); updateMapTransform(); }, {passive: false});

        const sitesData = {

                { type: 'cube_artifact', model: './models/cuneiform_tablet.glb', title: 'رقم طيني مسماري', desc: 'من مكتبة أشور بانيبال الشهيرة.', year: 'العصر الآشوري الحديث', x: 29.5, z: -10, rot: -90, camX: 20, camZ: -10 },
                { type: 'sculpture', model: './models/sennacherib_sculpture.glb', title: 'تمثال الملك سنحاريب', desc: 'الملك الآشوري الذي جعل نينوى عاصمة.', year: '700 ق.م', x: 0, z: -29.5, rot: 0, camX: 0, camZ: -20 },
                { type: 'hanging_pot', model: './models/pottery_jar.glb', title: 'إناء فخاري آشوري', desc: 'تم العثور عليه في تل قوينجق.', year: '700 ق.م', x: -29.5, z: -10, rot: 90, camX: -20, camZ: -10 },
                { type: 'cube_artifact', model: './models/cylinder_seal.glb', title: 'ختم اسطواني ملكي', desc: 'تظهر عليه مشاهد دينية وحربية.', year: 'العصر الآشوري', x: -29.5, z: 10, rot: 90, camX: -20, camZ: 10 },
                { type: 'return_waypoint', title: 'بوابة القاعة', desc: 'لقد أنهيت الجولة في هذه القاعة.', year: 'النهاية', x: 0, z: 29.5, rot: 180, camX: 0, camZ: 20 }
            ],

                { id: 'p7', model: './models/alhadba_minaret.glb', title: 'المنارة الحدباء', desc: 'المعلم الأبرز لمدينة الموصل القديمة.', year: '1127 م' },
                { id: 'p8', model: './models/nuri_mihrab.glb', title: 'محراب الجامع النوري', desc: 'قطعة فنية نادرة من الرخام.', year: '1170 م' },
                { id: 'p9', model: './models/mosuli_ewer.glb', title: 'إبريق نحاسي موصلي', desc: 'تحفة مطعمة بالفضة العصر الأتابكي.', year: '1172 م' },
                { id: 'p10', model: './models/bashtabiya.glb', title: 'مجسم قلعة باشطابيا', desc: 'بقايا القلعة التاريخية المطلة على دجلة.', year: '1232 م' },
                { id: 'p11', model: './models/wood_box.glb', title: 'صندوق أتابكي مطعم', desc: 'صندوق أثري من العصر الأتابكي.', year: '1250 م' },

        };

        const uiLayer = document.getElementById('ui-layer');
        const controlsUI = document.getElementById('controls-ui');
        const pillarsContainer = document.getElementById('pillars-container');
        const cameraRig = document.getElementById('cameraRig');
        const infoPanel = document.getElementById('info-panel');

        const infoDesc = document.getElementById('info-desc');
        const timelineUI = document.getElementById('timeline-ui');
        const timelineSlider = document.getElementById('timeline-slider');

        function enterSite(siteId) {
            uiLayer.style.opacity = '0'; document.getElementById('instructions').style.opacity = '1'; 
            
            let camEl = document.querySelector('#cam');
            if(camEl) { 
                camEl.object3D.rotation.set(0, 0, 0); 
                if(camEl.components['look-controls']) { camEl.components['look-controls'].yawObject.rotation.set(0,0,0); camEl.components['look-controls'].pitchObject.rotation.set(0,0,0); }
                camEl.setAttribute('look-controls', 'enabled', true);
            }
            cameraRig.removeAttribute('animation');

            setTimeout(() => {
                uiLayer.style.display = 'none'; uiLayer.style.pointerEvents = 'none'; controlsUI.style.display = 'flex'; 
                infoPanel.style.display = 'none';

                if (siteId === 'site3') {
                    buildWhiteElegantRoom(pillarsContainer);
                    startStairsMode(sitesData[siteId]);
                } else if (siteId === 'site2') {
                    window.currentRoomType = 'site2';
                    buildKouyunjikDarkRoom(pillarsContainer);
                    startKouyunjikMode(sitesData[siteId]);
                } else {
                    window.currentRoomType = 'normal';
                    buildWhiteElegantRoom(pillarsContainer);
                    document.getElementById('instructions').innerHTML = '<b>دليل التحكم:</b><br>👆 إصبع واحد: التفات وإدارة المجسمات<br>✌️ إصبعين: مشي وزووم للتقريب<br>🖱️ نقرة واحدة: تقريب عميق للمجسم';
                    cameraRig.setAttribute('position', '0 1.6 0'); cameraRig.setAttribute('rotation', '0 0 0');
                    document.getElementById('main-dir-light').setAttribute('intensity', '0.8');
                    spawnPillarsAndArtifacts(sitesData[siteId]); 
                }
            }, 800);
        }

        function startKouyunjikMode(data) {
            document.getElementById('instructions').innerHTML = '<b>دليل الغرفة التاريخية:</b><br>↔️ سكرول للمشي بمحاذاة المعروضات<br>🖱️ نقرة واحدة: تقريب عميق للمجسم';
            
            document.getElementById('main-dir-light').setAttribute('intensity', '0.4');
            document.getElementById('point-light').setAttribute('intensity', '0.5');

            timelineSlider.max = data.length - 1;
            timelineSlider.value = 0;
            timelineSlider.step = 1; 
            document.getElementById('timeline-year').innerText = 'المعروض';
            timelineUI.style.display = 'flex';
            setTimeout(() => { timelineUI.style.opacity = '1'; }, 50);

            window.currentRoomConfig = spawnSite2Artifacts(data);
            site2TargetProgress = 0; site2CurrentProgress = 0; window.lastShownTextIdx = -1;
            cameraRig.setAttribute('position', '0 1.6 20'); 
        }

        function spawnSite2Artifacts(data) {
            let config = [];

            data.forEach((item, index) => {
                if(item.type === 'return_waypoint') {
                    config.push({ ...item, artY: 2.5 });
                    return;
                }

                let x = item.x; let z = item.z; let rotY = item.rot;
                let artY = 1.6; 

                let group = document.createElement('a-entity');
                group.setAttribute('position', `${x} 0 ${z}`);
                group.setAttribute('rotation', `0 ${rotY} 0`);

                let spot = document.createElement('a-light'); spot.setAttribute('type', 'spot'); spot.setAttribute('intensity', '0.6'); spot.setAttribute('angle', '40'); spot.setAttribute('position', '0 4 3'); spot.setAttribute('target', '#artifact-' + index); group.appendChild(spot);

                // الإضافة الجديدة: دبل كليك يرجع الكاميرا
                let lastClickTime = 0;
                let handleZoomClick = function() {
                    let now = Date.now();
                    if (now - lastClickTime < 400) {
                        closeInfoPanel();
                        lastClickTime = 0;
                        return;
                    }
                    lastClickTime = now;

                    let startZ = window.stairZoom || 0;
                    let targetZ = -6.5; 
                    let startTime = Date.now();
                    let animateZoom = () => {
                        let now = Date.now();
                        let progress = (now - startTime) / 600; 
                        if (progress > 1) progress = 1;
                        let ease = 1 - Math.pow(1 - progress, 3);
                        window.stairZoom = startZ + (targetZ - startZ) * ease;
                        if (progress < 1) requestAnimationFrame(animateZoom);
                    };
                    animateZoom();
                    infoPanel.style.display = 'none';
                    setTimeout(() => { infoTitle.innerText = item.title; infoDesc.innerText = item.desc; if (!window.isUIHidden) infoPanel.style.display = 'block'; }, 400);
                };

                if (item.type === 'door') {
                    let wall = document.createElement('a-box'); wall.setAttribute('width', '8'); wall.setAttribute('height', '7'); wall.setAttribute('depth', '0.2'); wall.setAttribute('color', '#1a1d21'); wall.setAttribute('position', '0 3.5 -0.1'); group.appendChild(wall);
                    let door = document.createElement('a-plane'); door.setAttribute('width', '3'); door.setAttribute('height', '4.5'); door.setAttribute('color', '#0a0a0c'); door.setAttribute('position', '0 2.25 -0.22'); group.appendChild(door);
                    let sign = document.createElement('a-plane'); sign.setAttribute('width', '2'); sign.setAttribute('height', '0.6'); sign.setAttribute('color', '#495057'); sign.setAttribute('position', '0 5.2 -0.22'); group.appendChild(sign);
                    artY = 2.5;
                } else if (item.type === 'cube_artifact') {
                    let cube = document.createElement('a-box'); cube.setAttribute('width', '1.2'); cube.setAttribute('height', '1.2'); cube.setAttribute('depth', '1.2'); cube.setAttribute('color', '#495057'); cube.setAttribute('position', '0 0.6 0'); cube.setAttribute('material', 'roughness: 0.5; metalness: 0.3'); cube.setAttribute('shadow', 'cast: true; receive: true'); group.appendChild(cube);
                    let artifact = document.createElement('a-entity'); artifact.setAttribute('id', 'artifact-' + index); artifact.setAttribute('gltf-model', `url(${item.model})`); artifact.setAttribute('scale', '2.5 2.5 2.5'); artifact.setAttribute('position', '0 1.5 0'); 
                    artifact.setAttribute('class', 'clickable'); artifact.setAttribute('artifact-rotator', ''); artifact.addEventListener('click', handleZoomClick);
                    group.appendChild(artifact);
                    artY = 1.5;
                } else if (item.type === 'panel') {
                    let frame = document.createElement('a-box'); frame.setAttribute('width', '4.5'); frame.setAttribute('height', '3.5'); frame.setAttribute('depth', '0.2'); frame.setAttribute('color', '#2b2d30'); frame.setAttribute('position', '0 2.5 -0.11'); group.appendChild(frame);
                    let relief = document.createElement('a-image'); relief.setAttribute('id', 'artifact-' + index); relief.setAttribute('src', `url(${item.panel_img})`); relief.setAttribute('width', '4'); relief.setAttribute('height', '3'); relief.setAttribute('position', '0 2.5 -0.22'); 
                    relief.setAttribute('class', 'clickable'); relief.addEventListener('click', handleZoomClick);
                    group.appendChild(relief);
                    artY = 2.5;
                } else if (item.type === 'sculpture') {
                    let artifact = document.createElement('a-entity'); artifact.setAttribute('id', 'artifact-' + index); artifact.setAttribute('gltf-model', `url(${item.model})`); artifact.setAttribute('scale', '2.5 2.5 2.5'); artifact.setAttribute('position', '0 0.5 0'); artifact.setAttribute('shadow', 'cast: true; receive: true'); 
                    artifact.setAttribute('class', 'clickable'); artifact.setAttribute('artifact-rotator', ''); artifact.addEventListener('click', handleZoomClick);
                    group.appendChild(artifact);
                    artY = 2.5;
                } else if (item.type === 'hanging_pot') {
                    let stand = document.createElement('a-cylinder'); stand.setAttribute('radius', '0.05'); stand.setAttribute('height', '4'); stand.setAttribute('color', '#495057'); stand.setAttribute('position', '0 2 -0.11'); group.appendChild(stand);
                    let artifact = document.createElement('a-entity'); artifact.setAttribute('id', 'artifact-' + index); artifact.setAttribute('gltf-model', `url(${item.model})`); artifact.setAttribute('scale', '1.5 1.5 1.5'); artifact.setAttribute('position', '0 2 -0.3'); 
                    artifact.setAttribute('class', 'clickable'); artifact.setAttribute('artifact-rotator', ''); artifact.addEventListener('click', handleZoomClick);
                    group.appendChild(artifact);
                    artY = 2.0;
                }

                pillarsContainer.appendChild(group);
                config.push({ ...item, artY });
            });
            return config;
        }

        function startStairsMode(data) {
            window.isStairsMode = true;
            document.getElementById('instructions').innerHTML = '<b>دليل السجل الزمني:</b><br>↔️ استخدم السكرول للتنقل<br>🖱️ نقرة واحدة: تقريب عميق للمجسم';
            document.getElementById('main-dir-light').setAttribute('intensity', '0.8');

            timelineSlider.max = data.length - 1; timelineSlider.value = 0; timelineSlider.step = 0.01; 
            document.getElementById('timeline-year').innerText = '1127';
            timelineUI.style.display = 'flex'; setTimeout(() => { timelineUI.style.opacity = '1'; }, 50);

            let N = data.length; const R = 4.0; 
            window.currentStairsConfig = data.map((item, i) => { let angle = i * ((2 * Math.PI) / N); let h = 1.0 + (i * 1.5); return { ...item, angle, x: R * Math.sin(angle), z: -R * Math.cos(angle), pillarH: h, artY: h }; });
            
            maxStairProgress = data.length - 1; targetStairProgress = 0; currentStairProgress = 0; window.lastShownTextIdx = -1;
            
            window.currentStairsConfig.forEach((item, index) => {
                let group = document.createElement('a-entity'); group.setAttribute('position', `${item.x} 0 ${item.z}`); group.setAttribute('scale', '0.001 0.001 0.001');
                let pillarGroup = document.createElement('a-entity');
                let base = document.createElement('a-cylinder'); base.setAttribute('radius', '0.8'); base.setAttribute('height', '0.3'); base.setAttribute('color', '#ced4da'); base.setAttribute('material', 'roughness: 0.5; metalness: 0.1'); base.setAttribute('position', '0 0.15 0'); pillarGroup.appendChild(base);
                let shaft = document.createElement('a-cylinder'); shaft.setAttribute('radius', '0.5'); shaft.setAttribute('height', item.pillarH - 0.6); shaft.setAttribute('color', '#ffffff'); shaft.setAttribute('position', `0 ${item.pillarH/2} 0`); pillarGroup.appendChild(shaft);
                let cap = document.createElement('a-cylinder'); cap.setAttribute('radius', '0.8'); cap.setAttribute('height', '0.3'); cap.setAttribute('color', '#ced4da'); cap.setAttribute('material', 'roughness: 0.5; metalness: 0.1'); cap.setAttribute('position', `0 ${item.pillarH - 0.15} 0`); pillarGroup.appendChild(cap);
                
                let rotYarcade = (item.angle * 180 / Math.PI); pillarGroup.setAttribute('rotation', `0 ${rotYarcade} 0`); group.appendChild(pillarGroup);

                // الإضافة الجديدة: دبل كليك يرجع الكاميرا
                let lastClickTime = 0;
                let handleZoomClick = function() {
                    let now = Date.now();
                    if (now - lastClickTime < 400) {
                        closeInfoPanel();
                        lastClickTime = 0;
                        return;
                    }
                    lastClickTime = now;

                    let startZ = window.stairZoom || 0;
                    let targetZ = -4.5; 
                    let startTime = Date.now();
                    let animateZoom = () => {
                        let now = Date.now();
                        let progress = (now - startTime) / 600; 
                        if (progress > 1) progress = 1;
                        let ease = 1 - Math.pow(1 - progress, 3);
                        window.stairZoom = startZ + (targetZ - startZ) * ease;
                        if (progress < 1) requestAnimationFrame(animateZoom);
                    };
                    animateZoom();
                    infoPanel.style.display = 'none';
                    setTimeout(() => { infoTitle.innerText = item.title; infoDesc.innerText = item.desc; if (!window.isUIHidden) infoPanel.style.display = 'block'; }, 400);
                };

                if (item.model) {
                    let artifact = document.createElement('a-entity'); artifact.setAttribute('id', 'artifact-' + index); artifact.setAttribute('gltf-model', `url(${item.model})`); artifact.setAttribute('scale', '2.5 2.5 2.5'); 
                    let rotY = (item.angle * 180 / Math.PI); artifact.setAttribute('rotation', `0 ${rotY} 0`); artifact.setAttribute('position', `0 ${item.artY} 0`); 
                    artifact.setAttribute('class', 'clickable'); artifact.setAttribute('artifact-rotator', ''); artifact.addEventListener('click', handleZoomClick);
                    group.appendChild(artifact);
                }
                pillarsContainer.appendChild(group);
                let delay = index * 150; group.setAttribute('animation', `property: scale; to: 1 1 1; dur: 1500; easing: easeOutBack; delay: ${delay}`);
            });
        }

        function spawnPillarsAndArtifacts(data) {
            data.forEach((item, index) => {
                let group = document.createElement('a-entity'); group.setAttribute('position', `${item.x} -5 ${item.z}`); 
                let pillar = document.createElement('a-cylinder'); pillar.setAttribute('radius', '0.6'); pillar.setAttribute('height', '1.5'); pillar.setAttribute('color', '#f8f9fa'); pillar.setAttribute('class', 'clickable'); group.appendChild(pillar);
                if (item.model) { let artifact = document.createElement('a-entity'); artifact.setAttribute('gltf-model', `url(${item.model})`); artifact.setAttribute('scale', '2.5 2.5 2.5'); artifact.setAttribute('rotation', item.rot); artifact.setAttribute('position', '0 0.75 0'); artifact.setAttribute('class', 'clickable'); group.appendChild(artifact); }
                pillarsContainer.appendChild(group);
                let delay = index * 300; setTimeout(() => { group.setAttribute('animation', `property: position; to: ${item.x} 0.75 ${item.z}; dur: 1500; easing: easeOutElastic`); }, 400 + delay);
                
                // الإضافة الجديدة: دبل كليك للرجوع بالغرف البيضاء العادية
                let lastClickTime = 0;
                let handleClick = function() {
                    let now = Date.now();
                    if (now - lastClickTime < 400) {
                        closeInfoPanel();
                        lastClickTime = 0;
                        return;
                    }
                    lastClickTime = now;

                    cameraRig.removeAttribute('animation'); let dist = Math.sqrt(item.x * item.x + item.z * item.z); 
                    let ratio = (dist - 1.0) / dist; let zoomX = item.x * ratio; let zoomZ = item.z * ratio;
                    cameraRig.setAttribute('animation', `property: position; to: ${zoomX} 1.6 ${zoomZ}; dur: 1500; easing: easeOutCubic`);
                    
                    let targetVec = new THREE.Vector3(item.x, 1.25, item.z);
                    let m = new THREE.Matrix4();
                    m.lookAt(new THREE.Vector3(zoomX, 1.6, zoomZ), targetVec, new THREE.Vector3(0,1,0));
                    cameraRig.object3D.quaternion.setFromRotationMatrix(m);

                    if (window.currentRotatingArtifact && window.currentArtifactOriginalRot) { window.currentRotatingArtifact.setAttribute('rotation', window.currentArtifactOriginalRot); }
                    let artifact = group.querySelector('a-entity[gltf-model]');
                    if (artifact) { artifact.setAttribute('artifact-rotator', ''); window.currentRotatingArtifact = artifact; window.currentArtifactOriginalRot = item.rot; }
                    infoPanel.style.display = 'none'; setTimeout(() => { infoTitle.innerText = item.title; infoDesc.innerText = item.desc; if (!window.isUIHidden) infoPanel.style.display = 'block'; }, 400);
                };
                pillar.addEventListener('click', handleClick);
                let artEl = group.querySelector('a-entity[gltf-model]');
                if (artEl) artEl.addEventListener('click', handleClick);
            });
            if(data.length > 0) { 
                let first = data[0]; let targetVec = new THREE.Vector3(first.x, 1.25, first.z); 
                let m = new THREE.Matrix4();
                m.lookAt(cameraRig.object3D.position, targetVec, new THREE.Vector3(0,1,0));
                cameraRig.object3D.quaternion.setFromRotationMatrix(m);
            }
        }

        function closeInfoPanel() {
            infoPanel.style.display = 'none'; 
            if(!window.isStairsMode && window.currentRoomType !== 'site2') {
                cameraRig.setAttribute('animation', `property: position; to: 0 1.6 0; dur: 1500; easing: easeOutCubic`);
            } else {
                let startZ = window.stairZoom || 0;
                let targetZ = 0; 
                let startY = window.stairPanY || 0;
                let startTime = Date.now();
                let animateZoom = () => {
                    let now = Date.now();
                    let progress = (now - startTime) / 600; 
                    if (progress > 1) progress = 1;
                    let ease = 1 - Math.pow(1 - progress, 3);
                    window.stairZoom = startZ + (targetZ - startZ) * ease;
                    // تصفير الارتفاع عند الرجوع
                    window.stairPanY = startY * (1 - ease);
                    if (progress < 1) requestAnimationFrame(animateZoom);
                };
                animateZoom();
            }
            if (window.currentRotatingArtifact && window.currentArtifactOriginalRot) { window.currentRotatingArtifact.setAttribute('rotation', window.currentArtifactOriginalRot); window.currentRotatingArtifact = null; }
        }

        function exitSite() {
            uiLayer.style.display = 'block'; setTimeout(() => { uiLayer.style.opacity = '1'; uiLayer.style.pointerEvents = 'all'; }, 10);
            window.isUIHidden = false; window.isStairsMode = false; window.currentRoomType = '';
            document.getElementById('timeline-ui').style.display = 'none'; document.getElementById('timeline-ui').style.opacity = '0';
            let eyeIcon = document.getElementById('eye-icon'); if(eyeIcon) eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            let camEl = document.querySelector('#cam');
            if(camEl) { camEl.setAttribute('look-controls', 'enabled', true); camEl.object3D.rotation.set(0, 0, 0); if(camEl.components['look-controls']) { camEl.components['look-controls'].yawObject.rotation.set(0,0,0); camEl.components['look-controls'].pitchObject.rotation.set(0,0,0); } }
            controlsUI.style.display = 'none'; infoPanel.style.display = 'none'; document.getElementById('instructions').style.opacity = '1'; pillarsContainer.innerHTML = ''; cameraRig.removeAttribute('animation'); cameraRig.setAttribute('position', '0 1.6 0'); cameraRig.setAttribute('rotation', '0 0 0'); 
            window.currentRotatingArtifact = null; window.currentArtifactOriginalRot = null; window.stairZoom = 0; window.stairPanY = 0; 
        }
    </script>
</body>
</html>
