<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متحف الموصل الافتراضي - الخريطة التفاعلية</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Tajawal', sans-serif; background-color: #000; touch-action: none; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 100; overflow: hidden;
            transition: opacity 0.8s ease-in-out;
            display: block; 
        }

        #map-content {
            position: absolute; 
            width: 2600px; 
            height: 1600px;
            background-image: url('mosul_map_5sites.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            top: 50%; left: 50%; 
            transform-origin: center center; cursor: grab;
            will-change: transform;
        }
        #map-content:active { cursor: grabbing; }

        .map-title {
            position: absolute; top: 30px; width: 100%; text-align: center;
            font-size: 38px; font-weight: bold; color: #e9d8a6; z-index: 101; pointer-events: none;
            font-family: 'Amiri', serif;
            text-shadow: 0 5px 15px rgba(233, 216, 166, 0.3), 0 2px 5px rgba(0,0,0,0.8);
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.7), transparent);
            padding: 15px 0;
            letter-spacing: 1px;
        }

        .map-pin {
            position: absolute; 
            cursor: pointer; 
            transform: translate(-50%, -50%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pin-img {
            width: 120px; 
            height: auto;
            pointer-events: none; 
            transition: all 0.3s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); 
        }

        .map-pin:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 10; }
        .map-pin:hover .pin-img { filter: drop-shadow(0 10px 25px rgba(238, 155, 0, 0.8)); }
        .map-pin:active { transform: translate(-50%, -50%) scale(0.85) !important; }

        #controls-ui {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 101;
            display: none; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }
        
        #instructions {
            background: rgba(255, 255, 255, 0.9); color: #333; padding: 15px; border-radius: 12px;
            font-size: 15px; text-align: right; pointer-events: none; border: 1px solid #ccc;
            transition: opacity 0.5s ease; opacity: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .circle-btn {
            width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; pointer-events: all; transition: all 0.3s; border: none;
        }
        .circle-btn:active { transform: scale(0.9); }
        
        #back-btn { background: rgba(187, 43, 43, 0.95); color: white; border: 1px solid #ff4d4d; box-shadow: 0 5px 15px rgba(187,43,43,0.4); }
        #back-btn:hover { background: rgba(220, 30, 30, 1); box-shadow: 0 5px 20px rgba(187,43,43,0.6); }
        
        #hide-ui-btn { background: rgba(255, 255, 255, 0.9); color: #333; border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #hide-ui-btn:hover { background: #e0e0e0; color: #000; }

        #info-panel {
            display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 500px;
            background: rgba(255, 255, 255, 0.95); color: #333; padding: 25px; border-radius: 15px; border: 1px solid #ddd;
            z-index: 200; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-out; font-family: 'Tajawal', sans-serif;
        }
        
        @keyframes fadeIn { from { opacity: 0; bottom: -20px; } to { opacity: 1; bottom: 30px; } }
        #info-title { margin-top: 0; color: #333; font-size: 26px; font-family: 'Amiri', serif; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        #info-desc { font-size: 16px; line-height: 1.8; margin-bottom: 20px; color: #555; }
        #close-info-btn {
            background: #e0e0e0; color: #333; border: 1px solid #ccc; font-weight: bold; font-family: 'Tajawal', sans-serif;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; float: left; transition: all 0.2s;
        }
        #close-info-btn:hover { background: #ccc; color: #000; }

        /* التايم لاين الجديد (نُقل للأعلى وتم تعديل ألوانه لتناسب الثيم الفاتح) */
        #timeline-ui {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 500px; display: none; z-index: 105;
            background: rgba(255, 255, 255, 0.9); padding: 15px 25px; border-radius: 30px;
            border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            align-items: center; gap: 15px; transition: opacity 0.5s;
        }
        #timeline-slider {
            flex-grow: 1; -webkit-appearance: none; height: 6px; background: #ddd;
            border-radius: 4px; outline: none; direction: rtl; pointer-events: all;
        }
        #timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: #333; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        #timeline-year {
            color: #333; font-size: 22px; font-weight: bold; font-family: 'Amiri', serif; min-width: 70px; text-align: center;
        }
    </style>

    <script>
        window.isUIHidden = false;
        window.isArtifactDragging = false; 
        
        function toggleUI(forceState) {
            window.isUIHidden = typeof forceState === 'boolean' ? forceState : !window.isUIHidden;
            const info = document.getElementById('info-panel');
            const inst = document.getElementById('instructions');
            const eyeIcon = document.getElementById('eye-icon');
            const timelineUI = document.getElementById('timeline-ui');
            
            if (window.isUIHidden) {
                info.style.display = 'none'; inst.style.opacity = '0';
                if (window.isStairsMode && timelineUI) timelineUI.style.opacity = '0';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                if (window.currentRotatingArtifact || window.isStairsMode) info.style.display = 'block';
                inst.style.opacity = '1';
                if (window.isStairsMode && timelineUI) timelineUI.style.opacity = '1';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        AFRAME.registerComponent('artifact-rotator', {
            init: function () {
                this.isDragging = false; this.previousX = 0; this.camera = document.querySelector('#cam');
                this.onDown = (e) => {
                    let evt = e.detail && e.detail.mouseEvent ? e.detail.mouseEvent : e;
                    if (evt.touches && evt.touches.length > 1) return; 
                    this.isDragging = true; 
                    window.isArtifactDragging = true; 
                    this.previousX = evt.clientX || (evt.touches && evt.touches[0] ? evt.touches[0].clientX : 0);
                    if(this.camera && !window.isStairsMode) this.camera.setAttribute('look-controls', 'enabled', false);
                };
                this.onMove = (e) => {
                    if (!this.isDragging) return;
                    if (e.touches && e.touches.length > 1) { this.isDragging = false; window.isArtifactDragging = false; if(this.camera && !window.isStairsMode) this.camera.setAttribute('look-controls', 'enabled', true); return; }
                    let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : undefined);
                    if(clientX === undefined) return;
                    let deltaX = clientX - this.previousX; this.el.object3D.rotation.y += deltaX * 0.015; this.previousX = clientX;
                };
                this.onUp = () => { if(this.isDragging) { this.isDragging = false; window.isArtifactDragging = false; if(this.camera && !window.isStairsMode) this.camera.setAttribute('look-controls', 'enabled', true); } };
                this.el.addEventListener('mousedown', this.onDown); window.addEventListener('mousemove', this.onMove);
                window.addEventListener('mouseup', this.onUp); window.addEventListener('touchmove', this.onMove, {passive: true}); window.addEventListener('touchend', this.onUp);
            },
            tick: function () { if (!this.isDragging) this.el.object3D.rotation.y += 0.005; },
            remove: function () {
                this.el.removeEventListener('mousedown', this.onDown); window.removeEventListener('mousemove', this.onMove);
                window.removeEventListener('mouseup', this.onUp); window.removeEventListener('touchmove', this.onMove); window.removeEventListener('touchend', this.onUp);
                if(this.camera && !window.isStairsMode) this.camera.setAttribute('look-controls', 'enabled', true);
            }
        });

        // بناء الغرفة الفخمة البيضاء والرصاصية مع تفعيل استقبال الظلال
        function buildWhiteElegantRoom(container) {
            let room = document.createElement('a-entity');
            
            // أرضية رصاصية فاتحة جداً تستقبل الظل
            let floor = document.createElement('a-plane');
            floor.setAttribute('rotation', '-90 0 0'); floor.setAttribute('width', '80'); floor.setAttribute('height', '80');
            floor.setAttribute('color', '#e9ecef'); floor.setAttribute('material', 'roughness: 0.4; metalness: 0.1'); 
            floor.setAttribute('shadow', 'receive: true');
            room.appendChild(floor);

            // سقف أبيض
            let ceil = document.createElement('a-plane');
            ceil.setAttribute('rotation', '90 0 0'); ceil.setAttribute('width', '80'); ceil.setAttribute('height', '80');
            ceil.setAttribute('color', '#ffffff'); ceil.setAttribute('position', '0 18 0');
            room.appendChild(ceil);

            // جدران بيضاء ورصاصية فاتحة
            const walls = [ { x: 0, y: 9, z: -40, rotY: 0 }, { x: 0, y: 9, z: 40, rotY: 180 }, { x: -40, y: 9, z: 0, rotY: 90 }, { x: 40, y: 9, z: 0, rotY: -90 } ];

            walls.forEach(w => {
                let wall = document.createElement('a-plane');
                wall.setAttribute('width', '80'); wall.setAttribute('height', '18');
                wall.setAttribute('color', '#f8f9fa'); wall.setAttribute('material', 'roughness: 0.9; metalness: 0.0');
                wall.setAttribute('rotation', `0 ${w.rotY} 0`); wall.setAttribute('position', `${w.x} ${w.y} ${w.z}`);
                wall.setAttribute('shadow', 'receive: true');
                room.appendChild(wall);

                // إطارات رصاصية داكنة للزينة بدل الذهبي
                let bottomTrim = document.createElement('a-box');
                bottomTrim.setAttribute('width', '80'); bottomTrim.setAttribute('height', '0.4'); bottomTrim.setAttribute('depth', '0.2');
                bottomTrim.setAttribute('color', '#adb5bd'); bottomTrim.setAttribute('material', 'roughness: 0.5; metalness: 0.2');
                bottomTrim.setAttribute('position', `${w.x * 0.99} 0.2 ${w.z * 0.99}`); bottomTrim.setAttribute('rotation', `0 ${w.rotY} 0`);
                room.appendChild(bottomTrim);
                
                let topTrim = document.createElement('a-box');
                topTrim.setAttribute('width', '80'); topTrim.setAttribute('height', '0.6'); topTrim.setAttribute('depth', '0.4');
                topTrim.setAttribute('color', '#ced4da'); topTrim.setAttribute('material', 'roughness: 0.5; metalness: 0.2');
                topTrim.setAttribute('position', `${w.x * 0.99} 17.7 ${w.z * 0.99}`); topTrim.setAttribute('rotation', `0 ${w.rotY} 0`);
                room.appendChild(topTrim);
            });

            container.appendChild(room);
        }

        window.isStairsMode = false;
        let targetStairProgress = 0;
        let currentStairProgress = 0;
        let maxStairProgress = 0;

        AFRAME.registerComponent('stairs-manager', {
            tick: function () {
                if (!window.isStairsMode || !window.currentStairsConfig) return;
                
                currentStairProgress += (targetStairProgress - currentStairProgress) * 0.1;
                
                let idx1 = Math.floor(currentStairProgress);
                let idx2 = Math.min(idx1 + 1, maxStairProgress);
                let t = currentStairProgress - idx1; 
                
                let c1 = window.currentStairsConfig[idx1];
                let c2 = window.currentStairsConfig[idx2];
                
                let currentAngle = c1.angle + (c2.angle - c1.angle) * t;
                let currentArtH = c1.pillarH + (c2.pillarH - c1.pillarH) * t;
                
                let camR = 7.0; 
                let camX = camR * Math.sin(currentAngle);
                let camZ = -camR * Math.cos(currentAngle);
                let camY = currentArtH + 1.0; 
                
                this.el.setAttribute('position', `${camX} ${camY} ${camZ}`);
                
                // التعديل الذكي: توجيه الكاميرا للمجسم مع السماح لك بالالتفات
                let artX = 4.0 * Math.sin(currentAngle);
                let artZ = -4.0 * Math.cos(currentAngle);
                let targetVec = new THREE.Vector3(artX, currentArtH + 0.5, artZ);
                this.el.object3D.lookAt(targetVec); // يوجه المسار الأساسي، بس look-controls يبقى شغال للإصبع!
                
                let closest = Math.round(currentStairProgress);
                if (window.lastShownStairText !== closest) {
                    window.lastShownStairText = closest;
                    document.getElementById('info-title').innerText = window.currentStairsConfig[closest].title;
                    document.getElementById('info-desc').innerText = window.currentStairsConfig[closest].desc;
                    document.getElementById('timeline-year').innerText = window.currentStairsConfig[closest].year;
                    if (!window.isUIHidden) document.getElementById('info-panel').style.display = 'block';
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('timeline-slider').addEventListener('input', function(e) {
                targetStairProgress = parseFloat(e.target.value);
            });
        });

        AFRAME.registerComponent('blender-controls', {
            schema: { speed: {default: 0.015}, zoomSpeed: {default: 0.08} },
            init: function () {
                this.camera = document.querySelector('#cam'); this.active = false; this.lastX = 0; this.lastY = 0;
                document.addEventListener('contextmenu', e => e.preventDefault());
                document.addEventListener('mousedown', (e) => { if (e.button === 2 || e.button === 1) { this.active = true; this.lastX = e.clientX; this.lastY = e.clientY; } });
                document.addEventListener('mouseup', () => this.active = false);
                document.addEventListener('mousemove', (e) => { if (!this.active || window.isStairsMode) return; let dx = e.clientX - this.lastX, dy = e.clientY - this.lastY; this.lastX = e.clientX; this.lastY = e.clientY; this.pan(-dx, dy); });

                let initialDist = 0;
                document.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2 && !window.isStairsMode) {
                        this.active = true; this.lastX = (e.touches[0].clientX + e.touches[1].clientX) / 2; this.lastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    }
                });
                document.addEventListener('touchmove', (e) => {
                    if (this.active && e.touches.length === 2 && !window.isStairsMode) {
                        let cx = (e.touches[0].clientX + e.touches[1].clientX) / 2, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        let dx = cx - this.lastX, dy = cy - this.lastY; this.lastX = cx; this.lastY = cy; this.pan(-dx, dy); 
                        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        let distDelta = currentDist - initialDist; initialDist = currentDist; this.zoom(distDelta * -0.005); 
                    }
                });
                document.addEventListener('touchend', () => this.active = false);
                document.addEventListener('wheel', (e) => { if(!window.isStairsMode) this.zoom(e.deltaY * 0.02); });
            },
            pan: function(dx, dy) { 
                if (!this.camera) return; 
                let camRot = this.camera.object3D.rotation; 
                let v = new THREE.Vector3(dx * this.data.speed, -dy * this.data.speed, 0); 
                v.applyEuler(camRot); 
                this.el.object3D.position.add(v); 
                toggleUI(true); 
            },
            zoom: function(dz) {
                if (!this.camera) return; this.el.removeAttribute('animation'); 
                let camRot = this.camera.object3D.rotation; let v = new THREE.Vector3(0, 0, dz); v.applyEuler(camRot); this.el.object3D.position.add(v);
                
                if (dz < -0.001) { 
                    toggleUI(true); 
                } else if (dz > 0.001) { 
                    toggleUI(false); 
                }
            }
        });
    </script>
</head>
<body>

    <div id="ui-layer">
        <div class="map-title">متحف نينوى الافتراضي</div>
        
        <div id="map-content">
            <div id="pin-nergal" class="map-pin" style="top: 69%; left: 28%;" onclick="enterSite('site1')">
                <img src="site1.png" alt="بوابة نرجال" class="pin-img">
            </div>
            <div id="pin-kouyunjik" class="map-pin" style="top: 37%; left: 42%;" onclick="enterSite('site2')">
                <img src="site2.png" alt="تل قوينجق" class="pin-img">
            </div>
            <div id="pin-nuri" class="map-pin" style="top: 34%; left: 43%;" onclick="enterSite('site3')">
                <img src="site3.png" alt="المنارة الحدباء" class="pin-img">
            </div>
            <div id="pin-bashtabiya" class="map-pin" style="top: 24%; left: 54%;" onclick="enterSite('site4')">
                <img src="site4.png" alt="قلعة باشطابيا" class="pin-img">
            </div>
            <div id="pin-museum" class="map-pin" style="top: 51%; left: 47%;" onclick="enterSite('site5')">
                <img src="site5.png" alt="القاعة الرئيسية" class="pin-img">
            </div>
        </div>
    </div>

    <div id="controls-ui">
        <div id="instructions">
            <b>دليل التحكم:</b><br>👆 إصبع واحد: التفات في المكان<br>✌️ إصبعين: مشي وزووم للتقريب<br>🖱️ اضغط على القطعة لمعرفة تفاصيلها
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="hide-ui-btn" class="circle-btn" onclick="toggleUI()" title="إخفاء/إظهار الواجهة">
                <svg id="eye-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button id="back-btn" class="circle-btn" onclick="exitSite()" title="الرجوع للخارطة">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <div id="timeline-ui">
        <span id="timeline-year">1127</span>
        <input type="range" id="timeline-slider" min="0" max="5" value="0" step="0.01">
    </div>

    <div id="info-panel">
        <h2 id="info-title">عنوان القطعة</h2>
        <p id="info-desc">شرح تفصيلي عن القطعة الأثرية يظهر هنا...</p>
        <button id="close-info-btn" onclick="closeInfoPanel()">إغلاق الشرح</button>
    </div>

    <a-scene id="main-scene" renderer="colorManagement: true;" shadow="type: pcfsoft" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        
        <a-sky src="ancient_mosul_sky.jpg"></a-sky> 

        <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
        <a-light type="directional" intensity="0.8" position="-2 6 4" castShadow="true"></a-light>

        <a-entity id="cameraRig" position="0 1.6 0" blender-controls stairs-manager>
            <a-camera id="cam" look-controls></a-camera>
        </a-entity>

        <a-entity id="pillars-container"></a-entity>
    </a-scene>

    <script>
        const mapContent = document.getElementById('map-content');
        const mapWidth = 2600;
        const mapHeight = 1600;
        
        let minScale = Math.max(window.innerWidth / mapWidth, window.innerHeight / mapHeight);
        let scale = minScale; 
        let pointX = 0, pointY = 0;
        let mapPanning = false, mapStart = { x: 0, y: 0 };
        
        function clampMap() {
            const maxPanX = (mapWidth * scale - window.innerWidth) / 2;
            const maxPanY = (mapHeight * scale - window.innerHeight) / 2;
            if (pointX > maxPanX) pointX = maxPanX; if (pointX < -maxPanX) pointX = -maxPanX;
            if (pointY > maxPanY) pointY = maxPanY; if (pointY < -maxPanY) pointY = -maxPanY;
        }

        function updateMapTransform() { 
            clampMap(); 
            mapContent.style.transform = `translate(calc(-50% + ${pointX}px), calc(-50% + ${pointY}px)) scale(${scale})`; 
        }

        window.addEventListener('resize', () => {
            minScale = Math.max(window.innerWidth / mapWidth, window.innerHeight / mapHeight);
            if (scale < minScale) scale = minScale;
            updateMapTransform();
        });

        updateMapTransform(); 
        
        mapContent.addEventListener('mousedown', function(e) { 
            e.preventDefault(); mapPanning = true; 
            mapStart = { x: e.clientX - pointX, y: e.clientY - pointY }; 
        });
        window.addEventListener('mousemove', function(e) { 
            if (!mapPanning) return; 
            pointX = e.clientX - mapStart.x; pointY = e.clientY - mapStart.y; updateMapTransform(); 
        });
        window.addEventListener('mouseup', function() { mapPanning = false; });
        
        mapContent.addEventListener('touchstart', function(e) { 
            mapPanning = true; 
            mapStart = { x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY }; 
        }, {passive: false});

        window.addEventListener('touchmove', function(e) { 
            if (!mapPanning) return; 
            e.preventDefault(); 
            pointX = e.touches[0].clientX - mapStart.x; 
            pointY = e.touches[0].clientY - mapStart.y; 
            updateMapTransform(); 
        }, {passive: false});

        window.addEventListener('touchend', function() { mapPanning = false; });

        mapContent.addEventListener('wheel', function(e) {
            e.preventDefault(); 
            let delta = (e.wheelDelta ? e.wheelDelta : -e.deltaY); 
            (delta > 0) ? (scale *= 1.1) : (scale /= 1.1);
            scale = Math.min(Math.max(minScale, scale), 3); 
            updateMapTransform();
        }, {passive: false});

        const sitesData = {
            'site1': [ 
                { id: 'p1', model: './models/winged_bull.glb', x: -4, z: -4, scale: '1 1 1', rot: '0 45 0', title: 'الثور المجنح (لاماسو)', desc: 'تمثال ضخم برأس إنسان وجسد ثور.' },
                { id: 'p2', model: './models/ashurbanipal.glb', x: 0, z: -6, scale: '1 1 1', rot: '0 0 0', title: 'الملك آشور بانيبال', desc: 'آخر الملوك العظماء للإمبراطورية الآشورية الحديثة.' },
                { id: 'p3', model: './models/cuneiform_tablet.glb', x: 4, z: -4, scale: '1 1 1', rot: '0 -45 0', title: 'لوح مسماري', desc: 'لوح طيني نُقش عليه بالكتابة المسمارية.' }
            ],
            'site2': [ 
                { id: 'p4', model: './models/nimrud_obelisk.glb', x: -4, z: -4, scale: '1 1 1', rot: '0 0 0', title: 'المسلة السوداء', desc: 'مسلة تاريخية للملك شلمنصر الثالث.' },
                { id: 'p5', model: './models/spring_girl.glb', x: 0, z: -6, scale: '1 1 1', rot: '0 0 0', title: 'تمثال فتاة الربيع', desc: 'أحد الرموز الحديثة لمدينة الموصل.' },
                { id: 'p6', model: './models/gold_dinar.glb', x: 4, z: -4, scale: '1 1 1', rot: '0 -45 0', title: 'دينار إسلامي', desc: 'عملة نقدية تاريخية ضُربت في الموصل.' }
            ],
            'site3': [ 
                { id: 'p7', model: './models/alhadba_minaret.glb', title: 'المنارة الحدباء', desc: 'المعلم الأبرز لمدينة الموصل.', year: '1127 م' },
                { id: 'p8', model: './models/nuri_mihrab.glb', title: 'محراب الجامع النوري', desc: 'قطعة فنية نادرة من الرخام.', year: '1170 م' },
                { id: 'p9', model: './models/mosuli_ewer.glb', title: 'إبريق نحاسي موصلي', desc: 'تحفة مطعمة بالفضة.', year: '1172 م' },
                { id: 'p10', model: './models/bashtabiya.glb', title: 'مجسم قلعة باشطابيا', desc: 'بقايا القلعة التاريخية المطلة على دجلة.', year: '1232 م' },
                { id: 'p11', model: './models/wood_box.glb', title: 'صندوق أتابكي مطعم', desc: 'صندوق أثري من العصر الأتابكي.', year: '1250 م' },
                { id: 'p12', model: './models/hassuna_pot.glb', title: 'إناء فخاري - حضارة حسونة', desc: 'يعود الإناء إلى أقدم القرى.', year: '1262 م' }
            ],
            'site4': [ 
                { id: 'p10', model: './models/bashtabiya.glb', x: -4, z: -4, scale: '1 1 1', rot: '0 0 0', title: 'مجسم قلعة باشطابيا', desc: 'بقايا القلعة التاريخية المطلة على دجلة.' },
                { id: 'p11', model: './models/wood_box.glb', x: 0, z: -6, scale: '1 1 1', rot: '0 0 0', title: 'صندوق أتابكي مطعم', desc: 'صندوق أثري من العصر الأتابكي.' }
            ],
            'site5': [ 
                { id: 'p12', model: './models/hassuna_pot.glb', x: -4, z: -4, scale: '1 1 1', rot: '0 0 0', title: 'إناء فخاري - حضارة حسونة', desc: 'يعود الإناء إلى أقدم القرى الزراعية في العالم.' },
                { id: 'p13', model: './models/winged_bull.glb', x: 0, z: -6, scale: '1 1 1', rot: '0 0 0', title: 'لاماسو مصغر', desc: 'نسخة مصغرة من الثور المجنح.' }
            ]
        };

        const uiLayer = document.getElementById('ui-layer');
        const controlsUI = document.getElementById('controls-ui');
        const pillarsContainer = document.getElementById('pillars-container');
        const cameraRig = document.getElementById('cameraRig');
        const infoPanel = document.getElementById('info-panel');
        const infoTitle = document.getElementById('info-title');
        const infoDesc = document.getElementById('info-desc');

        function enterSite(siteId) {
            uiLayer.style.opacity = '0'; document.getElementById('instructions').style.opacity = '1'; 
            
            let camEl = document.querySelector('#cam');
            if(camEl) { camEl.object3D.rotation.set(0, 0, 0); }
            cameraRig.removeAttribute('animation');

            setTimeout(() => {
                uiLayer.style.display = 'none'; uiLayer.style.pointerEvents = 'none'; controlsUI.style.display = 'flex'; 
                
                buildWhiteElegantRoom(pillarsContainer);

                if (siteId === 'site3') {
                    startStairsMode(sitesData[siteId]);
                } else {
                    document.getElementById('instructions').innerHTML = '<b>دليل التحكم في القاعة:</b><br>👆 إصبع واحد: التفات في المكان<br>✌️ إصبعين: مشي وزووم للتقريب<br>🖱️ اضغط على القطعة لمعرفة تفاصيلها';
                    cameraRig.setAttribute('position', '0 1.6 0');
                    cameraRig.setAttribute('rotation', '0 0 0');
                    if(camEl) camEl.setAttribute('look-controls', 'enabled', true);
                    spawnPillarsAndArtifacts(sitesData[siteId]); 
                }
            }, 800);
        }

        function startStairsMode(data) {
            window.isStairsMode = true;
            document.getElementById('instructions').innerHTML = '<b>دليل السجل الزمني:</b><br>↔️ استخدم الشريط بالأسفل للتنقل عبر الزمن<br>👀 المس الشاشة للالتفات حولك';
            
            let timelineUI = document.getElementById('timeline-ui');
            timelineUI.style.display = 'flex';
            setTimeout(() => { timelineUI.style.opacity = '1'; }, 50);

            let slider = document.getElementById('timeline-slider');
            slider.max = data.length - 1;
            slider.value = 0;

            let N = data.length;
            let R = 4.0; 
            
            window.currentStairsConfig = data.map((item, i) => {
                let angle = i * ((2 * Math.PI) / N); 
                let h = 1.0 + (i * 1.5); 
                
                return { 
                    ...item, 
                    angle: angle,
                    x: R * Math.sin(angle), 
                    z: -R * Math.cos(angle), 
                    pillarH: h, 
                    artY: h 
                };
            });
            
            maxStairProgress = data.length - 1;
            targetStairProgress = 0;
            currentStairProgress = 0;
            window.lastShownStairText = -1;
            
            let camEl = document.querySelector('#cam');
            if(camEl) { camEl.setAttribute('look-controls', 'enabled', true); }
            
            window.currentStairsConfig.forEach((item, index) => {
                let group = document.createElement('a-entity');
                group.setAttribute('position', `${item.x} 0 ${item.z}`); 
                group.setAttribute('scale', '0.001 0.001 0.001');

                // بناء الأعمدة البيضاء المظللة والأنيقة (تستقبل وترمي ظلال)
                let pillarGroup = document.createElement('a-entity');
                
                let base = document.createElement('a-cylinder');
                base.setAttribute('radius', '0.8'); base.setAttribute('height', '0.3');
                base.setAttribute('color', '#ced4da'); base.setAttribute('material', 'roughness: 0.5; metalness: 0.1');
                base.setAttribute('position', '0 0.15 0');
                base.setAttribute('shadow', 'cast: true; receive: true');
                pillarGroup.appendChild(base);
                
                let shaft = document.createElement('a-cylinder');
                shaft.setAttribute('radius', '0.5'); shaft.setAttribute('height', item.pillarH - 0.6);
                shaft.setAttribute('color', '#ffffff'); shaft.setAttribute('position', `0 ${item.pillarH/2} 0`);
                shaft.setAttribute('shadow', 'cast: true; receive: true');
                pillarGroup.appendChild(shaft);
                
                let cap = document.createElement('a-cylinder');
                cap.setAttribute('radius', '0.8'); cap.setAttribute('height', '0.3');
                cap.setAttribute('color', '#ced4da'); cap.setAttribute('material', 'roughness: 0.5; metalness: 0.1');
                cap.setAttribute('position', `0 ${item.pillarH - 0.15} 0`);
                cap.setAttribute('shadow', 'cast: true; receive: true');
                pillarGroup.appendChild(cap);
                
                let rotYarcade = (item.angle * 180 / Math.PI);
                pillarGroup.setAttribute('rotation', `0 ${rotYarcade} 0`); 
                group.appendChild(pillarGroup);

                let artifact;
                if (item.model) {
                    artifact = document.createElement('a-entity');
                    artifact.setAttribute('gltf-model', `url(${item.model})`); 
                    artifact.setAttribute('scale', '0.8 0.8 0.8'); 
                    artifact.setAttribute('shadow', 'cast: true; receive: true');
                    
                    let rotY = (item.angle * 180 / Math.PI);
                    artifact.setAttribute('rotation', `0 ${rotY} 0`); 
                    artifact.setAttribute('position', `0 ${item.artY} 0`);
                    artifact.setAttribute('class', 'clickable');
                    artifact.setAttribute('artifact-rotator', ''); 
                    group.appendChild(artifact);
                }
                pillarsContainer.appendChild(group);

                let delay = index * 150; 
                group.setAttribute('animation', `property: scale; to: 1 1 1; dur: 1500; easing: easeOutBack; delay: ${delay}`);
            });
        }

        function spawnPillarsAndArtifacts(data) {
            data.forEach((item, index) => {
                let group = document.createElement('a-entity');
                group.setAttribute('position', `${item.x} -5 ${item.z}`); 

                // الأعمدة البيضاء المظللة في القاعات العادية
                let pillar = document.createElement('a-cylinder');
                pillar.setAttribute('radius', '0.6'); pillar.setAttribute('height', '1.5'); 
                pillar.setAttribute('color', '#f8f9fa'); pillar.setAttribute('class', 'clickable'); 
                pillar.setAttribute('shadow', 'cast: true; receive: true');
                group.appendChild(pillar);

                let artifact;
                if (item.model) {
                    artifact = document.createElement('a-entity');
                    artifact.setAttribute('gltf-model', `url(${item.model})`); artifact.setAttribute('scale', '0.8 0.8 0.8'); 
                    artifact.setAttribute('rotation', item.rot); artifact.setAttribute('position', '0 0.75 0'); 
                    artifact.setAttribute('class', 'clickable'); 
                    artifact.setAttribute('shadow', 'cast: true; receive: true');
                    group.appendChild(artifact);
                }
                pillarsContainer.appendChild(group);

                let delay = index * 300; 
                setTimeout(() => { group.setAttribute('animation', `property: position; to: ${item.x} 0.75 ${item.z}; dur: 1500; easing: easeOutElastic`); }, 400 + delay);

                let handleClick = function() {
                    cameraRig.removeAttribute('animation'); 
                    let dist = Math.sqrt(item.x * item.x + item.z * item.z);
                    let ratio = (dist - 1.8) / dist; 
                    let zoomX = item.x * ratio; let zoomZ = item.z * ratio;
                    
                    cameraRig.setAttribute('animation', `property: position; to: ${zoomX} 1.6 ${zoomZ}; dur: 1500; easing: easeOutCubic`);
                    if (window.currentRotatingArtifact && window.currentArtifactOriginalRot) {
                        window.currentRotatingArtifact.removeAttribute('artifact-rotator'); window.currentRotatingArtifact.setAttribute('rotation', window.currentArtifactOriginalRot);
                    }
                    if (artifact) {
                        artifact.setAttribute('artifact-rotator', ''); window.currentRotatingArtifact = artifact; window.currentArtifactOriginalRot = item.rot;
                    }
                    infoPanel.style.display = 'none';
                    setTimeout(() => { infoTitle.innerText = item.title; infoDesc.innerText = item.desc; if (!window.isUIHidden) infoPanel.style.display = 'block'; }, 1200);
                };
                pillar.addEventListener('click', handleClick); if(artifact) artifact.addEventListener('click', handleClick);
            });
        }

        function closeInfoPanel() {
            infoPanel.style.display = 'none'; 
            if(!window.isStairsMode) cameraRig.setAttribute('animation', `property: position; to: 0 1.6 0; dur: 1500; easing: easeOutCubic`);
            if (window.currentRotatingArtifact && window.currentArtifactOriginalRot) {
                window.currentRotatingArtifact.removeAttribute('artifact-rotator'); window.currentRotatingArtifact.setAttribute('rotation', window.currentArtifactOriginalRot); window.currentRotatingArtifact = null;
            }
        }

        function exitSite() {
            uiLayer.style.display = 'block'; 
            setTimeout(() => { uiLayer.style.opacity = '1'; uiLayer.style.pointerEvents = 'all'; }, 10);
            
            window.isUIHidden = false; 
            window.isStairsMode = false;
            
            document.getElementById('timeline-ui').style.display = 'none';
            document.getElementById('timeline-ui').style.opacity = '0';

            let eyeIcon = document.getElementById('eye-icon');
            if(eyeIcon) eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            
            let camEl = document.querySelector('#cam');
            if(camEl) {
                camEl.setAttribute('look-controls', 'enabled', true);
                camEl.object3D.rotation.set(0, 0, 0); 
            }
            
            controlsUI.style.display = 'none'; infoPanel.style.display = 'none'; document.getElementById('instructions').style.opacity = '1'; 
            pillarsContainer.innerHTML = ''; cameraRig.removeAttribute('animation'); cameraRig.setAttribute('position', '0 1.6 0'); cameraRig.setAttribute('rotation', '0 0 0');
            window.currentRotatingArtifact = null; window.currentArtifactOriginalRot = null;
        }
    </script>
</body>
</html>
